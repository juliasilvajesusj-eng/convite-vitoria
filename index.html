<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#102a42" />
  <title>Convite | Vitória 15 anos</title>
  <meta name="description" content="Clique para abrir o convite interativo de aniversário da Vitória." />
  <link rel="icon" type="image/png" href="assets/favicon.png" />
  <link rel="apple-touch-icon" href="assets/favicon.png" />

  <!-- Pré-visualização para WhatsApp, Facebook, Telegram e LinkedIn -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Convite Vitória 15 anos" />
  <meta property="og:title" content="Te convido para um dia incrível e inesquecível." />
  <meta property="og:description" content="Clique para abrir o convite interativo." />
  <meta property="og:url" content="https://juliasilvajesusj-eng.github.io/convite-vitoria/" />
  <meta property="og:image" content="https://juliasilvajesusj-eng.github.io/convite-vitoria/assets/preview.jpg" />
  <meta property="og:image:secure_url" content="https://juliasilvajesusj-eng.github.io/convite-vitoria/assets/preview.jpg" />
  <meta property="og:image:type" content="image/jpeg" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Prévia do convite interativo de aniversário da Vitória" />

  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="✨ Você foi convidado para o aniversário da Vitória!" />
  <meta name="twitter:description" content="Clique para abrir o convite interativo." />
  <meta name="twitter:image" content="https://juliasilvajesusj-eng.github.io/convite-vitoria/assets/preview.jpg" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <main class="app" aria-label="Convite interativo Vitória 15 anos">
    <section id="intro" class="screen active">
      <div class="stars"></div>
      <button id="openEnvelope" class="image-button envelope-button" aria-label="Clique para abrir o convite">
        <img src="assets/envelope.png" alt="Envelope do convite. Clique para abrir." />
      </button>
    </section>

    <section id="videoScreen" class="screen">
      <video id="openingVideo" class="full-media" src="assets/abertura.mp4" playsinline preload="auto"></video>
      <button id="skipVideo" class="skip" type="button">Pular</button>
    </section>

    <section id="mainInvite" class="screen">
      <div class="card-frame">
        <img src="assets/convite.png" alt="Convite de aniversário de 15 anos da Vitória" />
        <a class="hotspot local" target="_blank" rel="noopener" aria-label="Abrir localização da festa" href="#"></a>
        <a class="hotspot presentes" aria-label="Abrir sugestão de presente" href="#presentes"></a>
        <a class="hotspot confirmar" target="_blank" rel="noopener" aria-label="Confirmar presença" href="#"></a>
        <a class="hotspot manual" aria-label="Abrir manual do convidado" href="#manual"></a>
        <button id="backToEnvelope" class="back intro-back" type="button" aria-label="Voltar para a tela do envelope">Voltar</button>
      </div>
    </section>

    <section id="presentesPage" class="screen page">
      <div class="card-frame">
        <img src="assets/presentes.png" alt="Sugestão de presente" />
        <a class="hotspot pix" target="_blank" rel="noopener" aria-label="Acessar chave Pix" href="#"></a>
        <button class="back" type="button" aria-label="Voltar ao convite">Voltar</button>
      </div>
    </section>

    <section id="manualPage" class="screen page">
      <div class="card-frame">
        <img src="assets/manual.png" alt="Manual do convidado" />
        <button class="back" type="button" aria-label="Voltar ao convite">Voltar</button>
      </div>
    </section>
  </main>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
